kind = "mobile"
previewPath = "/"
title = "Школьный дневник"
version = "1.0.0"
id = "artifacts/school-diary"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 19053
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/school-diary run dev"

[services.env]
PORT = "19053"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/school-diary", "run", "build"]
run = ["pnpm", "--filter", "@workspace/school-diary", "run", "serve"]
