name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Setup Expo / EAS CLI
        run: npm install -g eas-cli

      - name: Build APK via EAS
        working-directory: artifacts/school-diary
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --output ./school-diary.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-diary-apk
          path: artifacts/school-diary/school-diary.apk
          retention-days: 30
