name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Setup Expo / EAS CLI
        run: npm install -g eas-cli

      - name: Build APK via EAS and download
        working-directory: artifacts/school-diary
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait 2>/dev/null)
          BUILD_ID=$(echo "$BUILD_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "Build ID: $BUILD_ID"
          echo "Waiting for build to finish..."
          eas build:view "$BUILD_ID" --json > /dev/null
          while true; do
            STATUS=$(eas build:view "$BUILD_ID" --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
            echo "Status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              APK_URL=$(eas build:view "$BUILD_ID" --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('artifacts',{}).get('buildUrl',''))")
              echo "APK URL: $APK_URL"
              curl -L "$APK_URL" -o school-diary.apk
              echo "Downloaded APK"
              break
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-diary-apk
          path: artifacts/school-diary/school-diary.apk
          retention-days: 30
